name: Release Build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, for example v0.1.0
        required: true
      release_name:
        description: Optional release title
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ""
            system-deps: |
              sudo apt-get update
              sudo apt-get install -y \
                libgtk-3-dev \
                libayatana-appindicator3-dev \
                librsvg2-dev \
                libwebkit2gtk-4.1-dev \
                build-essential \
                pkg-config \
                patchelf
          - platform: macos-latest
            args: ""
            system-deps: ""
          - platform: windows-latest
            args: ""
            system-deps: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.system-deps != ''
        run: ${{ matrix.system-deps }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm install

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
          releaseName: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.release_name || format('AirController {0}', github.event.inputs.tag_name)) || format('AirController {0}', github.ref_name) }}
          releaseBody: |
            Automated build for AirController.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
